<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhysioCare Premium</title>

<link rel="stylesheet" href="style.css">

<!-- AOS Animation -->
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>

<body>

<header class="navbar">
  <h2>PhysioCare</h2>
  <nav>
    <a href="#home">Home</a>
    <a href="#services">Services</a>
    <a href="#doctor">Doctor</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section id="home" class="hero">
  <div class="overlay"></div>
  <div class="hero-content" data-aos="fade-up">
    <h1>Move Better. Live Pain Free.</h1>
    <p>Advanced Physiotherapy in Kolkata</p>
    <button onclick="scrollToSection('contact')">Book Appointment</button>
  </div>
</section>

<!-- SERVICES -->
<section id="services" class="section">
  <h2 data-aos="fade-up">Our Services</h2>
  <div class="cards">
    <div class="card" data-aos="zoom-in">Orthopedic Rehab</div>
    <div class="card" data-aos="zoom-in">Sports Therapy</div>
    <div class="card" data-aos="zoom-in">Neuro Rehab</div>
    <div class="card" data-aos="zoom-in">Post Surgery</div>
  </div>
</section>

<!-- DOCTOR -->
<section id="doctor" class="section gray">
  <h2 data-aos="fade-up">Your Therapist</h2>
  <div class="doctor-box" data-aos="fade-right">
